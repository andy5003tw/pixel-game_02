name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 觸發部署的分支
  workflow_dispatch: # 允許手動觸發

# 設置權限以允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 確保不會有兩個部署同時進行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        env:
          # 從 GitHub Secrets 中注入環境變數
          VITE_GOOGLE_APP_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_APP_SCRIPT_URL }}
          VITE_PASS_THRESHOLD: ${{ secrets.VITE_PASS_THRESHOLD || '70' }}
          VITE_QUESTION_COUNT: ${{ secrets.VITE_QUESTION_COUNT || '5' }}
          VITE_USE_MOCK: ${{ secrets.VITE_USE_MOCK || 'false' }}
        # 加入 --base 確保 GitHub Pages 子目錄路徑正確
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
